<svg width="1400" height="320" viewBox="0 0 1400 320" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- BACKGROUND -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- GRID -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#0f172a" stroke-width="1"/>
    </pattern>

    <!-- GLOW -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- LINE -->
    <linearGradient id="lineGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>

    <style>

      .name{
        font-family: Arial, sans-serif;
        font-size: 58px;
        font-weight: 900;
        fill:white;
        letter-spacing:-2px;
      }

      .role{
        font-family: monospace;
        font-size:18px;
        fill:#22c55e;
        letter-spacing:6px;
      }

      .mono{
        font-family: monospace;
        fill:#cbd5e1;
      }

      .small{
        font-size:13px;
      }

      .medium{
        font-size:16px;
      }

      .green{
        fill:#22c55e;
      }

      .cyan{
        fill:#38bdf8;
      }

      .panel{
        fill:#050816;
        stroke:#1e293b;
        stroke-width:1.5;
      }

      .float{
        animation:float 5s ease-in-out infinite;
      }

      @keyframes float{
        0%,100%{
          transform:translateY(0px);
        }
        50%{
          transform:translateY(-6px);
        }
      }

      .pulse{
        animation:pulse 2s infinite;
      }

      @keyframes pulse{
        0%{opacity:.3}
        50%{opacity:1}
        100%{opacity:.3}
      }

      .move{
        animation:move 12s linear infinite;
      }

      @keyframes move{
        0%{
          transform:translateX(-200px);
          opacity:0;
        }
        10%{
          opacity:1;
        }
        90%{
          opacity:1;
        }
        100%{
          transform:translateX(1500px);
          opacity:0;
        }
      }

      .rotate{
        transform-origin:center;
        animation:rotate 16s linear infinite;
      }

      @keyframes rotate{
        from{
          transform:rotate(0deg);
        }
        to{
          transform:rotate(360deg);
        }
      }

      .radar{
        animation:radar 3s ease-in-out infinite;
      }

      @keyframes radar{
        0%,100%{
          opacity:.5;
        }
        50%{
          opacity:1;
        }
      }

    </style>

  </defs>

  <!-- BG -->
  <rect width="1400" height="320" fill="url(#bg)"/>
  <rect width="1400" height="320" fill="url(#grid)"/>

  <!-- MOVING LIGHTS -->
  <g opacity=".4">

    <rect class="move" x="0" y="70" width="100" height="2" fill="#22c55e"/>
    <rect class="move" x="0" y="140" width="70" height="2" fill="#38bdf8" style="animation-delay:2s"/>
    <rect class="move" x="0" y="240" width="120" height="2" fill="#22c55e" style="animation-delay:5s"/>

  </g>

  <!-- LEFT PANEL -->
  <g transform="translate(40 45)">

    <rect width="250" height="220" rx="16" class="panel"/>

    <text x="125"
      y="30"
      text-anchor="middle"
      class="mono green medium">
      ENGINEER_MINDSET
    </text>

    <g transform="translate(22 55)">
      <rect width="206" height="42" rx="10" fill="#0b1220" stroke="#1e293b"/>
      <text x="14" y="18" class="mono green medium">PROBLEM SOLVER</text>
      <text x="14" y="33" class="mono small">Scalable &amp; clean systems</text>
    </g>

    <g transform="translate(22 108)">
      <rect width="206" height="42" rx="10" fill="#0b1220" stroke="#1e293b"/>
      <text x="14" y="18" class="mono cyan medium">SECURITY FIRST</text>
      <text x="14" y="33" class="mono small">Reliable production apps</text>
    </g>

    <g transform="translate(22 161)">
      <rect width="206" height="42" rx="10" fill="#0b1220" stroke="#1e293b"/>
      <text x="14" y="18" class="mono green medium">PERFORMANCE</text>
      <text x="14" y="33" class="mono small">Fast optimized experience</text>
    </g>

  </g>

  <!-- CENTER -->
  <g class="float">

    <!-- BIG {} -->
    <text x="700"
      y="185"
      text-anchor="middle"
      font-size="180"
      fill="#22c55e"
      opacity=".08"
      font-family="monospace"
      font-weight="bold">
      { }
    </text>

    <!-- NAME -->
    <text x="700"
      y="125"
      text-anchor="middle"
      class="name">
      PARTH PIPERMINTWALA
    </text>

    <!-- ROLE -->
    <text x="700"
      y="165"
      text-anchor="middle"
      class="role">
      FULL STACK ENGINEER
    </text>

    <!-- LINE -->
    <line x1="500"
      y1="195"
      x2="900"
      y2="195"
      stroke="url(#lineGlow)"
      stroke-width="2"/>

    <!-- TECH STACK -->
    <g transform="translate(455 235)">

      <!-- CONTAINER -->
      <rect
        width="490"
        height="44"
        rx="14"
        fill="#0b1220"
        stroke="#1e293b"
        stroke-width="1.5"/>

      <!-- INNER GLOW -->
      <rect
        x="1"
        y="1"
        width="488"
        height="42"
        rx="13"
        fill="none"
        stroke="#22c55e"
        opacity="0.08"/>

      <!-- MERN -->
      <text
        x="38"
        y="28"
        class="mono green medium">
        MERN
      </text>

      <!-- DOT -->
      <circle cx="125" cy="22" r="3" fill="#64748b"/>

      <!-- NEXT -->
      <text
        x="152"
        y="28"
        class="mono medium">
        NEXT.JS
      </text>

      <!-- DOT -->
      <circle cx="248" cy="22" r="3" fill="#64748b"/>

      <!-- AWS -->
      <text
        x="275"
        y="28"
        class="mono medium">
        AWS
      </text>

      <!-- DOT -->
      <circle cx="360" cy="22" r="3" fill="#64748b"/>

      <!-- REDIS -->
      <text
        x="387"
        y="28"
        class="mono medium">
        REDIS
      </text>
    </g>

  </g>

  <!-- RIGHT PANEL -->
  <g transform="translate(1110 45)">

    <rect width="250" height="220" rx="16" class="panel"/>

    <text x="125"
      y="30"
      text-anchor="middle"
      class="mono green medium">
      CORE_STRENGTHS
    </text>

    <!-- RADAR -->
    <g transform="translate(125 125)">

      <!-- CIRCLES -->
      <circle r="72"
        fill="none"
        stroke="#1e293b"
        stroke-width="1.5"/>

      <circle r="50"
        fill="none"
        stroke="#1e293b"
        stroke-width="1"/>

      <circle r="28"
        fill="none"
        stroke="#1e293b"
        stroke-width="1"/>

      <!-- ROTATING -->
      <g class="rotate">

        <line x1="0"
          y1="0"
          x2="0"
          y2="-72"
          stroke="#22c55e"
          stroke-width="2"
          filter="url(#glow)"/>

        <circle cx="0"
          cy="-72"
          r="5"
          fill="#22c55e"
          filter="url(#glow)"/>

      </g>

      <!-- CENTER -->
      <circle r="8"
        fill="#22c55e"
        class="pulse"
        filter="url(#glow)"/>

      <!-- POINTS -->
      <circle cx="0" cy="-50" r="4" fill="#22c55e" class="radar"/>
      <circle cx="50" cy="0" r="4" fill="#38bdf8" class="radar"/>
      <circle cx="0" cy="50" r="4" fill="#22c55e" class="radar"/>
      <circle cx="-50" cy="0" r="4" fill="#38bdf8" class="radar"/>

    </g>

    <!-- LABELS -->
    <g class="mono small">

      <text x="94" y="60" >
        DEVELOPMENT
      </text>

      <text x="184" y="128">
        DEVOPS
      </text>

      <text x="102" y="198">
        SECURITY
      </text>

      <text x="11" y="128">
        DATABASE
      </text>

    </g>

  </g>

  <!-- TOP -->
  <g opacity=".6">

    <line x1="40"
      y1="25"
      x2="220"
      y2="25"
      stroke="#22c55e"
      stroke-width="2"/>

    <line x1="1180"
      y1="25"
      x2="1360"
      y2="25"
      stroke="#22c55e"
      stroke-width="2"/>

    <circle cx="700"
      cy="25"
      r="4"
      fill="#22c55e"
      class="pulse"/>

  </g>

  <!-- BOTTOM -->
  <g transform="translate(0 300)">

    <line x1="0"
      y1="0"
      x2="1400"
      y2="0"
      stroke="#1e293b"/>

    <text x="40"
      y="15"
      class="mono small"
      fill="#64748b">
      BUILD • TEST • DEPLOY • REPEAT
    </text>

    <text x="590"
      y="15"
      class="mono green medium">
      SYSTEM_STATUS: ONLINE
    </text>

    <text x="1080"
      y="15"
      class="mono small"
      fill="#64748b">
      SCALABLE • CLEAN • PRODUCTION_READY
    </text>

  </g>

</svg>