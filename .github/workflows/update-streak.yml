name: Update GitHub Streak

on:
  schedule:
    - cron: "0 */8 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: update-streak-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update-streak:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'Auto-update streak stats')"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: "22.x"

      - name: Update streak SVG
        run: node .github/scripts/update-streak.mjs

      - name: Configure Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Pull latest changes
        run: git pull origin main --rebase

      - name: Commit and Push changes
        run: |
          git add .
          git commit -m "Auto-update streak stats" || echo "No changes to commit"
          git push origin main