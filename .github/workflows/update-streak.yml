name: Update streak badge

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-streak-badge
  cancel-in-progress: true

jobs:
  update-streak:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Generate latest streak SVG
        run: node .github/scripts/update-streak.mjs

      - name: Commit streak SVG
        run: |
          if git diff --quiet -- assets/streak.svg; then
            echo "No streak changes to commit"
            exit 0
          fi

          git add assets/streak.svg
          git commit -m "Update streak badge"
          git push
