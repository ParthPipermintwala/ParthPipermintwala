name: Profile README Generator

on:
  schedule:
    - cron: "0 */12 * * *" # Runs every 12 hours

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Update README
        run: |
          TIMESTAMP=$(date -u '+%a %b %d %H:%M:%S UTC %Y')
          sed -i '/<!-- Profile updated:/d' README.md
          echo "<!-- Profile updated: $TIMESTAMP -->" >> README.md

      - name: Commit changes
        run: |
          git add README.md
          git commit -m "Auto-update profile README timestamp" || echo "No changes to commit"
          git push
